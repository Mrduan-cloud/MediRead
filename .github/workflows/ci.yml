name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 文件路径变更检测 —— 决定下面哪些 job 真的要跑。
  # 把 28-min docker-build 锁在 OCR / deps / 代码 实际改动时才触发,
  # 避免 README / docs PR 也付那个时间成本。
  changes:
    runs-on: ubuntu-22.04
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'requirements.txt'
              - 'app/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  lint-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          # tests/* 透过 app/agents/interpreter/__init__.py 拉到 react_chain → loguru,
          # 所以即便是"纯逻辑测试"也需要 loguru;test_auth_security 透过 app/auth/__init__.py
          # 急加载 jwt.py → 需要 fastapi + PyJWT,passwords.py → bcrypt。这里装的都是轻量库,
          # 不碰 paddleocr / paddlepaddle / pymilvus / sentence-transformers 等重型 OCR/RAG 栈。
          pip install pydantic pydantic-settings jsonschema rank_bm25 loguru bcrypt PyJWT fastapi

      - name: Ruff lint
        run: ruff check app tests scripts

      - name: AST parse all .py
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          fails = []
          for p in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  fails.append(f"{p}: {e}")
          if fails:
              print('\n'.join(fails))
              sys.exit(1)
          print("AST OK")
          PY

      - name: Pure-logic tests
        # test_ocr_parsing 测 _parse_paddle_result 纯函数（不碰 paddle/numpy/PIL）；
        # 真实 OCR 的 test_ocr_smoke 带 `ocr` 标记，被 addopts `-m 'not ocr'` 默认 deselect。
        # test_auth_security 测口令哈希 + 锁定策略纯函数（只需 bcrypt，不碰 DB/tortoise）；
        # 带 DB 的 test_routes_auth 需 tortoise/httpx,留给本地 + 完整 dev 依赖跑。
        run: pytest tests/test_normalizer.py tests/test_risk_grading.py tests/test_ocr_parsing.py tests/test_layout.py tests/test_auth_security.py tests/test_kb_docs.py tests/test_bm25.py tests/test_rrf_fusion.py tests/test_bm25_cache.py -v

      - name: Verify PaddleOCR pins (dry-run)
        # 在 setup-python (3.11) 环境里跑 verify 脚本 ——
        # 检查 paddleocr / paddlepaddle pin 在 Python 3.11 上能正常解析,
        # 同时锁定 Python 版本天花板(<3.13)。dry-run 模式不实际下载 paddle,
        # CI 单步执行时间 < 10s。若未来想接 --smoke,需要预算下载 paddle 的
        # ~500MB,单独 job + actions/cache。
        run: bash scripts/verify-paddle-pins.sh

  # 独立 job:验证 Dockerfile 还能 build。
  # - 只在 Dockerfile / requirements.txt / app 代码改动时触发,避免每次 docs PR 都跑 13 分钟
  # - 用 GHA layer cache (type=gha) 后续 build 1-2 分钟
  # - push=false 只验证不推 registry(暂时不需要发布镜像)
  # - 本地 docker build 实测:冷启动 ~13 min(paddlepaddle 装载占 9 min),
  #   image 7.29GB(W11 任务会瘦身到 <1.5GB,在那之前 CI 至少保证它能 build)
  docker-build:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: false
          tags: mediread:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
